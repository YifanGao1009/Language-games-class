<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Echo · Pulse — Biological Boundary</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden}

@keyframes breatheSlow{0%,100%{transform:scale(0.97);opacity:.55}50%{transform:scale(1.03);opacity:.9}}
@keyframes breatheFast{0%,100%{transform:scale(0.95)}50%{transform:scale(1.06)}}
@keyframes rippleOut{0%{transform:translate(-50%,-50%) scale(0.6);opacity:.55}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}
@keyframes flowIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes bgAmber{0%,100%{opacity:0}40%,60%{opacity:1}}
@keyframes bgCold{0%,100%{opacity:0}40%,60%{opacity:1}}
@keyframes drift{0%{opacity:.18;transform:translateY(-8px) translateX(0)}20%{opacity:.7}90%{opacity:.45}100%{opacity:0;transform:translateY(100vh) translateX(var(--dx,20px))}}

::-webkit-scrollbar{width:0}
input:focus{outline:none}
input:-webkit-autofill{-webkit-text-fill-color:rgba(255,255,255,0.5);box-shadow:0 0 0 40px #050505 inset}

.panel{
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.055);
  border-radius:16px;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.btn{
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.12);
  background:transparent;
  color:rgba(255,255,255,0.30);
  font-family:'DM Mono',monospace;
  font-size:.42rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  cursor:pointer;
  transition:border-color .4s,color .4s,background .4s;
  padding:7px 18px;
}
.btn:hover{border-color:rgba(255,255,255,0.26);color:rgba(255,255,255,0.58)}
.btn.active-c{border-color:rgba(0,209,255,0.42);color:rgba(0,209,255,0.82);background:rgba(0,209,255,0.05)}
.btn.active-a{border-color:rgba(255,179,71,0.42);color:rgba(255,179,71,0.82);background:rgba(255,179,71,0.05)}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

/* ─── Snow ──────────────────────────────────────────────────────── */
function Snow(){
  const ref = useRef(null);
  useEffect(()=>{
    const cv=ref.current, ctx=cv.getContext('2d');
    let W=cv.width=window.innerWidth, H=cv.height=window.innerHeight;
    const flakes=Array.from({length:140},(_,i)=>({
      x:Math.random()*W, y:Math.random()*H-H,
      r:.35+Math.random()*1.5,
      sp:.2+Math.random()*.75,
      sw:.12+Math.random()*.32,
      ph:Math.random()*Math.PI*2,
      op:.08+Math.random()*.38,
      dx:(Math.random()-.5)*28,
    }));
    let af;
    function draw(){
      ctx.clearRect(0,0,W,H);
      flakes.forEach(f=>{
        f.y+=f.sp; f.x+=Math.sin(f.ph)*f.sw; f.ph+=.013;
        if(f.y>H+8){f.y=-8;f.x=Math.random()*W;}
        ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${f.op})`;ctx.fill();
      });
      af=requestAnimationFrame(draw);
    }
    draw();
    const rs=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight};
    window.addEventListener('resize',rs);
    return()=>{cancelAnimationFrame(af);window.removeEventListener('resize',rs)};
  },[]);
  return <canvas ref={ref} style={{position:'fixed',inset:0,zIndex:0,pointerEvents:'none'}}/>;
}

/* ─── Fiber Sculpture ────────────────────────────────────────────── */
function FiberSculpture({stress,harmonize,silenced,audioData,onEnter,onLeave,onClick}){
  const ref=useRef(null);
  const phRef=useRef(0);
  const rafRef=useRef(null);

  useEffect(()=>{
    const cv=ref.current;
    const ctx=cv.getContext('2d');
    const SZ=500; cv.width=SZ; cv.height=SZ;
    const CX=SZ/2, CY=SZ/2;

    function frame(){
      phRef.current+=.011;
      const t=phRef.current;
      ctx.clearRect(0,0,SZ,SZ);

      const breath=1+(.038+stress*.025)*Math.sin(t*(harmonize?.42:.72));
      const baseR=94*breath;

      const STRANDS=harmonize?16:12;
      for(let s=0;s<STRANDS;s++){
        const frac=s/STRANDS;
        const isAmber=!harmonize&&frac>.52&&stress>.35;
        const isCyan=harmonize||(frac<.5);

        let stroke,shadow;
        if(silenced){
          stroke=`rgba(200,200,200,${.06+frac*.1})`;
          shadow='rgba(200,200,200,0.05)';
        } else if(isAmber){
          const a=.13+(stress-.35)*.52;
          stroke=`rgba(255,179,71,${Math.min(.72,a)})`;
          shadow='rgba(255,179,71,0.10)';
        } else if(isCyan){
          const a=harmonize?.22+frac*.28:.10+frac*.16;
          stroke=`rgba(0,209,255,${a})`;
          shadow='rgba(0,209,255,0.12)';
        } else {
          stroke=`rgba(255,255,255,${.07+frac*.18})`;
          shadow='rgba(255,255,255,0.06)';
        }

        const phase=(s/STRANDS)*Math.PI*2;
        const winding=harmonize?2.6:3.4+stress*2.1;
        const amp=baseR*(harmonize?.36:.26+stress*.24);

        let audioBoost=0;
        if(audioData&&audioData.length>0){
          const idx=Math.floor((s/STRANDS)*audioData.length);
          audioBoost=(audioData[idx]/255)*32;
        }

        ctx.beginPath();
        let first=true;
        for(let d=0;d<=362;d+=2){
          const rad=(d/360)*Math.PI*2;
          const r=baseR+(amp+audioBoost)*Math.sin(winding*rad+phase+t*(harmonize?.28:.58+stress*.9));
          const px=CX+r*Math.cos(rad+phase*.28);
          const py=CY+r*Math.sin(rad+phase*.28)*.68;
          first?(ctx.moveTo(px,py),first=false):ctx.lineTo(px,py);
        }
        ctx.closePath();

        const lw=harmonize?2.2:(1.0+stress*1.6+audioBoost/12);
        ctx.lineWidth=lw;
        ctx.shadowBlur=harmonize?22:(6+stress*16+audioBoost/5);
        ctx.shadowColor=shadow;
        ctx.strokeStyle=stroke;
        ctx.stroke();
        ctx.shadowBlur=0;
      }

      // Core gradient
      if(!silenced){
        const rg=ctx.createRadialGradient(CX,CY,0,CX,CY,baseR*.52);
        if(harmonize){
          rg.addColorStop(0,'rgba(0,209,255,0.055)');
        } else {
          rg.addColorStop(0,`rgba(255,179,71,${Math.min(.08,stress*.11)})`);
        }
        rg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=rg;ctx.beginPath();ctx.arc(CX,CY,baseR*.52,0,Math.PI*2);ctx.fill();
      }

      // Center dot
      ctx.beginPath();ctx.arc(CX,CY,3.5,0,Math.PI*2);
      ctx.fillStyle=silenced?'rgba(200,200,200,0.3)':harmonize?'rgba(0,209,255,0.55)':'rgba(255,255,255,0.35)';
      ctx.fill();

      rafRef.current=requestAnimationFrame(frame);
    }
    frame();
    return()=>cancelAnimationFrame(rafRef.current);
  },[stress,harmonize,silenced,audioData]);

  return(
    <canvas
      ref={ref}
      style={{width:'100%',height:'100%',cursor:'pointer',display:'block',borderRadius:'50%'}}
      onMouseEnter={onEnter}
      onMouseLeave={onLeave}
      onClick={onClick}
    />
  );
}

/* ─── Waveform Display (harmonic reconstruction) ──────────────────── */
function WaveDisplay({wave,color1='rgba(0,209,255,0.6)',color2='rgba(255,179,71,0.5)'}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!wave||!ref.current)return;
    const cv=ref.current;
    const ctx=cv.getContext('2d');
    const W=cv.width=cv.offsetWidth||190;
    const H=cv.height=52;
    ctx.clearRect(0,0,W,H);

    // Smooth harmonic version (apply low-pass style blend)
    const smooth=wave.map((v,i,a)=>{
      const w=Math.min(3,i,a.length-1-i);
      if(w===0)return v;
      let s=0,c=0;
      for(let j=-w;j<=w;j++){s+=a[i+j];c++;}
      return s/c;
    });

    for(let strand=0;strand<2;strand++){
      ctx.beginPath();
      smooth.forEach((v,i)=>{
        const x=(i/(smooth.length-1))*W;
        const off=strand===0?1:-1;
        const env=Math.sin((i/smooth.length)*Math.PI);
        const y=H/2-off*v*(H/2-5)*env;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      });
      ctx.strokeStyle=strand===0?color1:color2;
      ctx.lineWidth=1.4;
      ctx.shadowBlur=8;
      ctx.shadowColor=strand===0?'rgba(0,209,255,0.35)':'rgba(255,179,71,0.3)';
      ctx.stroke();
      ctx.shadowBlur=0;
    }
  },[wave]);
  return <canvas ref={ref} style={{width:'100%',height:52,display:'block',borderRadius:8,background:'rgba(0,0,0,0.4)'}}/>;
}

/* ─── Mini live waveform ─────────────────────────────────────────── */
function MiniWave({data}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!data||!ref.current)return;
    const cv=ref.current;
    const ctx=cv.getContext('2d');
    const W=cv.width=cv.offsetWidth||190;
    const H=cv.height=38;
    ctx.clearRect(0,0,W,H);
    const step=Math.max(1,Math.floor(data.length/(W/2)));
    const pts=[];
    for(let i=0;i<data.length;i+=step)pts.push(data[i]);
    ctx.beginPath();
    pts.forEach((v,i)=>{
      const x=(i/(pts.length-1))*W;
      const y=H-(v/255)*H;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.strokeStyle='rgba(255,179,71,0.65)';
    ctx.lineWidth=1.2;
    ctx.shadowBlur=6;
    ctx.shadowColor='rgba(255,179,71,0.38)';
    ctx.stroke();
    ctx.shadowBlur=0;
  },[data]);
  return <canvas ref={ref} style={{width:'100%',height:38,display:'block',borderRadius:6,background:'rgba(0,0,0,0.3)'}}/>;
}

/* ─── Sentiment ──────────────────────────────────────────────────── */
function analyzeSentiment(text){
  const t=text.toLowerCase();
  const warm=['sincere','love','thank','warm','kind','gentle','care','trust','wonderful','beautiful','happy','joy','hope','gratitude','peace','honest','open','真诚','温暖','感谢','爱','善意','信任','美好','开心','温柔','友善'];
  const cold=['hostile','angry','hate','threat','cold','dismiss','ignore','annoy','frustrated','rude','attack','blame','manipulat','betray','lie','insult','敌意','冷漠','愤怒','威胁','攻击','无视','欺骗','操控','憎恨'];
  const ws=warm.filter(w=>t.includes(w)).length;
  const cs=cold.filter(w=>t.includes(w)).length;
  if(ws>cs)return{tone:'warm',label:'Sincere warmth detected',desc:'Warming to sincerity.',score:Math.min(1,ws*.32)};
  if(cs>ws)return{tone:'cold',label:'Guarded presence sensed',desc:'Cooling layer activated.',score:Math.min(1,cs*.32)};
  return{tone:'neutral',label:'Neutral field',desc:'Observing quietly.',score:0};
}

/* ─── App ────────────────────────────────────────────────────────── */
function App(){
  const [stress,setStress]=useState(.22);
  const [harmonize,setHarmonize]=useState(false);
  const [silenced,setSilenced]=useState(false);
  const [ripple,setRipple]=useState(0);
  const [micActive,setMicActive]=useState(false);
  const [audioData,setAudioData]=useState(null);
  const [sentiment,setSentiment]=useState(null);
  const [empathyText,setEmpathyText]=useState('');
  const [bgTone,setBgTone]=useState('');
  const [statusMsg,setStatusMsg]=useState('');
  const [statusKey,setStatusKey]=useState(0);
  const [uploadWave,setUploadWave]=useState(null);
  const [uploadName,setUploadName]=useState('');

  const micStreamRef=useRef(null);
  const analyserRef=useRef(null);
  const audioCtxRef=useRef(null);
  const afMicRef=useRef(null);
  const stressIntervalRef=useRef(null);

  /* Drift stress */
  useEffect(()=>{
    stressIntervalRef.current=setInterval(()=>{
      if(!harmonize&&!silenced){
        setStress(s=>Math.max(.1,Math.min(.88,s+(Math.random()-.47)*.038)));
      }
    },2000);
    return()=>clearInterval(stressIntervalRef.current);
  },[harmonize,silenced]);

  function showStatus(msg){
    setStatusMsg(msg);
    setStatusKey(k=>k+1);
  }

  /* Mic toggle */
  const toggleMic=useCallback(async()=>{
    if(micActive){
      micStreamRef.current?.getTracks().forEach(t=>t.stop());
      cancelAnimationFrame(afMicRef.current);
      audioCtxRef.current?.close();
      setMicActive(false); setAudioData(null);
      showStatus('Sonic field released.');
      return;
    }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      micStreamRef.current=stream;
      const actx=new(window.AudioContext||window.webkitAudioContext)();
      audioCtxRef.current=actx;
      const analyser=actx.createAnalyser();
      analyser.fftSize=256; analyserRef.current=analyser;
      actx.createMediaStreamSource(stream).connect(analyser);
      const buf=new Uint8Array(analyser.frequencyBinCount);
      function poll(){
        analyser.getByteFrequencyData(buf);
        setAudioData([...buf]);
        const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
        setStress(Math.min(.92,avg/165));
        afMicRef.current=requestAnimationFrame(poll);
      }
      poll(); setMicActive(true);
      showStatus('Listening to your sonic field…');
    }catch(e){
      showStatus('Microphone access denied.');
    }
  },[micActive]);

  /* Harmonize */
  function handleHarmonize(){
    setHarmonize(h=>{
      const next=!h;
      setSilenced(false);
      if(next){setStress(.10);showStatus('Transforming chaos into deep sea resonance.');}
      else showStatus('Returning to ambient awareness…');
      return next;
    });
  }

  /* Silence click */
  function handleSculptureClick(){
    setSilenced(s=>{
      const next=!s;
      setHarmonize(false);
      if(next){setStress(.04);showStatus('Silence. All noise folded inward.');}
      else showStatus('Awakening from stillness…');
      return next;
    });
  }

  /* Hover ripple */
  function handleHoverEnter(){
    setRipple(r=>r+1);
  }

  /* Empathy */
  function handleEmpathy(e){
    e.preventDefault();
    if(!empathyText.trim())return;
    const r=analyzeSentiment(empathyText);
    setSentiment(r);
    setBgTone(r.tone);
    const msg=r.tone==='warm'
      ?'Necklace Adjusting: Warming to Sincerity.'
      :r.tone==='cold'
      ?'Necklace Adjusting: Cooling, sensing guarded presence.'
      :'Necklace Adjusting: Neutral field — observing.';
    showStatus(msg);
    setTimeout(()=>setBgTone(''),4200);
    setEmpathyText('');
  }

  /* Audio upload */
  async function handleUpload(e){
    const file=e.target.files[0];
    if(!file)return;
    setUploadName(file.name.length>18?file.name.slice(0,16)+'…':file.name);
    showStatus('Reconstructing your soundscape…');
    try{
      const ab=await file.arrayBuffer();
      const actx=new(window.AudioContext||window.webkitAudioContext)();
      const decoded=await actx.decodeAudioData(ab);
      const raw=decoded.getChannelData(0);
      const PTS=220, step=Math.max(1,Math.floor(raw.length/PTS));
      const wave=[];
      for(let i=0;i<PTS;i++){
        let sum=0;
        for(let j=0;j<step;j++)sum+=Math.abs(raw[Math.min(i*step+j,raw.length-1)]||0);
        wave.push(sum/step);
      }
      const mx=Math.max(...wave)||1;
      setUploadWave(wave.map(v=>v/mx));
      showStatus(`"${file.name.length>22?file.name.slice(0,20)+'…':file.name}" — reconstructed as harmonic resonance.`);
      actx.close();
    }catch(err){
      showStatus('Could not decode audio. Try MP3, WAV, or OGG.');
    }
    e.target.value='';
  }

  const stressPhrase=silenced?'silence':harmonize?'harmonic':stress<.28?'calm':stress<.55?'sensing':'elevated';

  return(
    <div style={{position:'fixed',inset:0,background:'#000',fontFamily:"'DM Mono',monospace"}}>
      <Snow/>

      {/* ── Background sentiment aura ── */}
      {bgTone==='warm'&&(
        <div key="warm" style={{
          position:'fixed',inset:0,zIndex:1,pointerEvents:'none',
          background:'radial-gradient(ellipse 65% 60% at 50% 50%, rgba(255,179,71,0.075) 0%, transparent 70%)',
          animation:'bgAmber 4.2s ease-in-out forwards',
        }}/>
      )}
      {bgTone==='cold'&&(
        <div key="cold" style={{
          position:'fixed',inset:0,zIndex:1,pointerEvents:'none',
          background:'radial-gradient(ellipse 65% 60% at 50% 50%, rgba(90,170,255,0.065) 0%, transparent 70%)',
          animation:'bgCold 4.2s ease-in-out forwards',
        }}/>
      )}

      {/* ── Hover ripple rings ── */}
      {[...Array(3)].map((_,i)=>(
        <div key={`${ripple}-${i}`} style={{
          position:'fixed',
          top:'50%',left:'50%',
          width:360,height:360,
          borderRadius:'50%',
          border:'1px solid rgba(0,209,255,0.25)',
          pointerEvents:'none',zIndex:2,
          animation:`rippleOut 1.4s ease-out ${i*220}ms forwards`,
        }}/>
      ))}

      {/* ── Header ── */}
      <div style={{
        position:'fixed',top:0,left:0,right:0,zIndex:30,
        display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'22px 44px',
        background:'linear-gradient(to bottom,rgba(0,0,0,.75),transparent)',
      }}>
        <span style={{
          fontSize:'.5rem',letterSpacing:'.52em',textTransform:'uppercase',
          background:'linear-gradient(120deg,#00D1FF,#FFB347)',
          WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text',
        }}>Echo · Pulse</span>
        <span style={{fontSize:'.42rem',letterSpacing:'.24em',color:'rgba(255,255,255,0.18)',textTransform:'uppercase'}}>
          Biological Boundary · Series I
        </span>
      </div>

      {/* ── Status message ── */}
      {statusMsg&&(
        <div key={statusKey} style={{
          position:'fixed',top:66,left:'50%',transform:'translateX(-50%)',
          zIndex:35,pointerEvents:'none',
          fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',
          fontSize:'.84rem',color:'rgba(0,209,255,.68)',letterSpacing:'.05em',
          whiteSpace:'nowrap',animation:'flowIn .5s ease both',
        }}>{statusMsg}</div>
      )}

      {/* ── Central sculpture ── */}
      <div style={{
        position:'fixed',top:'50%',left:'50%',
        transform:'translate(-50%,-50%)',
        width:340,height:340,zIndex:5,
      }}>
        {/* Ambient outer rings */}
        <div style={{
          position:'absolute',inset:-48,borderRadius:'50%',
          border:'1px solid rgba(0,209,255,0.05)',
          animation:'breatheSlow 11s ease-in-out infinite',
          pointerEvents:'none',
        }}/>
        <div style={{
          position:'absolute',inset:-26,borderRadius:'50%',
          border:`1px solid rgba(${silenced?'200,200,200':harmonize?'0,209,255':'255,179,71'},0.045)`,
          animation:'breatheSlow 8s ease-in-out infinite reverse',
          transition:'border-color 2s ease',
          pointerEvents:'none',
        }}/>

        <FiberSculpture
          stress={stress}
          harmonize={harmonize}
          silenced={silenced}
          audioData={audioData}
          onEnter={handleHoverEnter}
          onLeave={()=>{}}
          onClick={handleSculptureClick}
        />

        <div style={{
          position:'absolute',bottom:-36,left:'50%',transform:'translateX(-50%)',
          fontSize:'.36rem',letterSpacing:'.26em',textTransform:'uppercase',
          color:'rgba(255,255,255,0.16)',whiteSpace:'nowrap',pointerEvents:'none',
        }}>
          {silenced?'— silence —':'click · silence  ·  hover · feel'}
        </div>
      </div>

      {/* ── Stress bar (right edge) ── */}
      <div style={{
        position:'fixed',right:42,top:'50%',transform:'translateY(-50%)',
        zIndex:10,display:'flex',flexDirection:'column',alignItems:'center',gap:10,
      }}>
        <div style={{
          fontSize:'.35rem',letterSpacing:'.28em',color:'rgba(255,255,255,0.16)',
          textTransform:'uppercase',writingMode:'vertical-rl',letterSpacing:'.3em',
        }}>{stressPhrase}</div>
        <div style={{width:1,height:110,background:'rgba(255,255,255,0.07)',borderRadius:4,position:'relative'}}>
          <div style={{
            position:'absolute',bottom:0,left:0,right:0,
            height:`${stress*100}%`,borderRadius:4,
            background:stress>.58?'linear-gradient(to top,rgba(255,179,71,.65),rgba(255,179,71,.2))':'linear-gradient(to top,rgba(0,209,255,.55),rgba(0,209,255,.12))',
            transition:'height 1.8s ease,background 2.2s ease',
          }}/>
        </div>
      </div>

      {/* ── Action buttons (bottom center) ── */}
      <div style={{
        position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',
        zIndex:20,display:'flex',gap:14,alignItems:'center',
      }}>
        <button className={`btn${micActive?' active-a':''}`} onClick={toggleMic}>
          <span style={{
            display:'inline-block',width:5,height:5,borderRadius:'50%',
            background:micActive?'#FFB347':'rgba(255,255,255,0.28)',
            verticalAlign:'middle',marginRight:7,
            animation:micActive?'blink 1s step-end infinite':'none',
          }}/>
          {micActive?'Listening':'◎ Mic'}
        </button>
        <button className={`btn${harmonize?' active-c':''}`} onClick={handleHarmonize}>
          ∿ Harmonize
        </button>
        <button className={`btn${silenced?' active-c':''}`} onClick={handleSculptureClick}>
          {silenced?'◈ Awaken':'◈ Silence'}
        </button>
      </div>

      {/* ── LEFT PANEL: Empathy Thermal ── */}
      <div className="panel" style={{
        position:'fixed',left:28,top:'50%',transform:'translateY(-50%)',
        zIndex:15,width:230,padding:'20px 18px',
      }}>
        <div style={{fontSize:'.38rem',letterSpacing:'.32em',textTransform:'uppercase',color:'rgba(255,255,255,0.2)',marginBottom:11}}>
          Empathy · Thermal
        </div>
        <div style={{
          fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',
          fontSize:'.70rem',color:'rgba(255,255,255,0.30)',lineHeight:1.8,marginBottom:14,
        }}>
          Type what someone said.<br/>The necklace reads their tone.
        </div>
        <form onSubmit={handleEmpathy}>
          <textarea
            value={empathyText}
            onChange={e=>setEmpathyText(e.target.value)}
            placeholder="their words…"
            rows={3}
            style={{
              width:'100%',background:'rgba(255,255,255,0.04)',
              border:'1px solid rgba(255,255,255,0.09)',borderRadius:10,
              padding:'9px 11px',color:'rgba(255,255,255,0.52)',
              fontFamily:"'DM Mono',monospace",fontSize:'.58rem',
              resize:'none',marginBottom:10,lineHeight:1.7,
              transition:'border-color .3s',
            }}
            onFocus={e=>e.target.style.borderColor='rgba(0,209,255,0.22)'}
            onBlur={e=>e.target.style.borderColor='rgba(255,255,255,0.09)'}
          />
          <button type="submit" className="btn" style={{width:'100%',justifyContent:'center'}}>Read Tone</button>
        </form>
        {sentiment&&(
          <div style={{
            marginTop:13,padding:'10px 12px',borderRadius:10,
            border:`1px solid ${sentiment.tone==='warm'?'rgba(255,179,71,0.28)':sentiment.tone==='cold'?'rgba(100,180,255,0.22)':'rgba(255,255,255,0.09)'}`,
            background:sentiment.tone==='warm'?'rgba(255,179,71,0.05)':sentiment.tone==='cold'?'rgba(100,180,255,0.04)':'rgba(255,255,255,0.02)',
            animation:'flowIn .5s ease',
          }}>
            <div style={{
              fontSize:'.42rem',letterSpacing:'.14em',marginBottom:5,
              color:sentiment.tone==='warm'?'rgba(255,179,71,0.80)':sentiment.tone==='cold'?'rgba(120,200,255,0.72)':'rgba(255,255,255,0.38)',
            }}>{sentiment.label}</div>
            <div style={{
              fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',
              fontSize:'.65rem',color:'rgba(255,255,255,0.30)',lineHeight:1.6,
            }}>{sentiment.desc}</div>
          </div>
        )}
      </div>

      {/* ── RIGHT PANEL: 声纹调色盘 ── */}
      <div className="panel" style={{
        position:'fixed',right:28,top:'50%',transform:'translateY(-50%)',
        zIndex:15,width:230,padding:'20px 18px',
      }}>
        <div style={{fontSize:'.38rem',letterSpacing:'.32em',textTransform:'uppercase',color:'rgba(255,255,255,0.2)',marginBottom:11}}>
          voiceprint · Palette
        </div>
        <div style={{
          fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',
          fontSize:'.70rem',color:'rgba(255,255,255,0.30)',lineHeight:1.8,marginBottom:14,
        }}>
          Upload a dissonant sound.<br/>Watch it become harmonic.
        </div>

        <label style={{
          display:'block',padding:'8px 0',borderRadius:999,textAlign:'center',
          border:'1px solid rgba(255,255,255,0.12)',color:'rgba(255,255,255,0.30)',
          fontFamily:"'DM Mono',monospace",fontSize:'.40rem',letterSpacing:'.2em',
          textTransform:'uppercase',cursor:'pointer',transition:'all .3s',
        }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(255,255,255,0.26)';e.currentTarget.style.color='rgba(255,255,255,0.58)'}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(255,255,255,0.12)';e.currentTarget.style.color='rgba(255,255,255,0.30)'}}
        >
          {uploadName||'+ Upload Audio'}
          <input type="file" accept="audio/*,video/mp4" onChange={handleUpload} style={{display:'none'}}/>
        </label>

        {uploadWave&&(
          <div style={{marginTop:14,animation:'flowIn .6s ease'}}>
            <WaveDisplay wave={uploadWave}/>
            <div style={{
              fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',
              fontSize:'.62rem',color:'rgba(0,209,255,0.50)',marginTop:8,lineHeight:1.6,
            }}>Reconstructed as<br/>harmonic resonance.</div>
          </div>
        )}

        {micActive&&audioData&&(
          <div style={{marginTop:14}}>
            <div style={{fontSize:'.38rem',letterSpacing:'.18em',color:'rgba(255,179,71,0.42)',textTransform:'uppercase',marginBottom:6}}>
              Live Sonic Field
            </div>
            <MiniWave data={audioData}/>
          </div>
        )}

        {!uploadWave&&!micActive&&(
          <div style={{
            marginTop:14,padding:'10px 0',
            fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',
            fontSize:'.65rem',color:'rgba(255,255,255,0.16)',lineHeight:1.85,
          }}>
            "Some sounds are destined never to reach the equator."
          </div>
        )}
      </div>

      {/* ── Footer manifesto ── */}
      <div style={{
        position:'fixed',bottom:68,left:'50%',transform:'translateX(-50%)',
        zIndex:4,pointerEvents:'none',textAlign:'center',
      }}>
        <div style={{
          fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',
          fontSize:'.63rem',color:'rgba(255,255,255,0.13)',letterSpacing:'.06em',
          transition:'all 2s ease',
        }}>
          {silenced
            ?'Fragrance, warmth, seasons — all quietly slip past.'
            :harmonize
            ?'Like plum blossoms choosing to bloom even in shadow.'
            :stress>.6
            ?'In the end, it is always a missed encounter.'
            :'At the bottom of my heart is an umbrella not carried on a cloudy day.'}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
